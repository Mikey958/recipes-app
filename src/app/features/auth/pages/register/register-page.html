<section class="auth-form">
  <div class="auth-form__header">
    <h1 class="auth-form__title">Регистрация аккаунта</h1>
    <p class="auth-form__subtitle">
      У вас есть аккаунт?
      <a class="auth-form__subtitle-link link" routerLink="/auth/login">Вход</a>
    </p>
  </div>

  <form class="auth-form__form">
    <label class="auth-form__field">
      <span class="auth-form__label">Имя пользователя</span>
      <input class="auth-form__input" type="text" placeholder="Введите имя пользователя..." />
    </label>

    <label class="auth-form__field">
      <span class="auth-form__label">Почта</span>
      <input class="auth-form__input" type="email" placeholder="Введите ваш email..." />
    </label>

    <label class="auth-form__field">
      <span class="auth-form__label">Пароль</span>
      <input class="auth-form__input" type="password" placeholder="Введите ваш пароль..." />
    </label>

    <label class="auth-form__field">
      <span class="auth-form__label">Подтверждение пароля</span>
      <input class="auth-form__input" type="password" placeholder="Введите ваш пароль повторно..." />
    </label>

    <button type="submit" class="auth-form__submit">Регистрация</button>
  </form>
</section>
