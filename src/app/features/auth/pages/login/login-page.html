<section class="auth-form">
  <div class="auth-form__header">
    <h1 class="auth-form__title">Вход в аккаунт</h1>
    <p class="auth-form__subtitle">
      У вас нет аккаунта?
      <a class="auth-form__subtitle-link link" routerLink="/auth/register">Регистрация</a>
    </p>
  </div>

  <form class="auth-form__form">
    <label class="auth-form__field">
      <span class="auth-form__label">Почта</span>
      <input class="auth-form__input" type="email" placeholder="Введите ваш email..." />
    </label>

    <label class="auth-form__field">
      <span class="auth-form__label">Пароль</span>
      <input class="auth-form__input" type="password" placeholder="Введите ваш пароль..." />
    </label>

    <!--TODO Пока никуда не ведет, надо добавить страницу в будущем-->
    <a class="auth-form__sublink link" href="">Забыли пароль?</a>

    <button type="submit" class="auth-form__submit">Войти</button>
  </form>
</section>
